<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <th:block th:insert="layout/layout::library"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

        body{
            margin:0;
            height:100vh;
            font-family: 'Segoe UI', sans-serif;

            background:
                    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.6)),
                    url('/images/badminton-player-silhouette-jumping-beautiful-sky-sunset-109716231.webp');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* MAIN DASHBOARD */

        .dashboard{
            width:1000px;
            padding:45px;
            border-radius:18px;

            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);

            box-shadow:0 20px 45px rgba(0,0,0,0.35);
        }

        /* TITLE */

        .title{
            text-align:center;
            color:white;
            margin-bottom:45px;
        }

        .title span{
            color:#ffc107;
        }

        /* MENU CARD */

        .menu-card{

            padding:35px 20px;

            border-radius:15px;

            text-align:center;

            background:rgba(255,255,255,0.18);

            transition:0.3s;

        }

        .menu-card:hover{

            transform:translateY(-8px);

            background:rgba(255,255,255,0.28);

            box-shadow:0 10px 25px rgba(0,0,0,0.4);

        }

        .menu-icon{

            font-size:38px;

            margin-bottom:15px;

        }

        .menu-text{

            color:white;

            font-weight:600;

            font-size:17px;

        }

        a{
            text-decoration:none;
        }

        /* HOME BUTTON */

        .home-btn{

            margin-top:40px;

        }

        .home-btn button{

            padding:10px 30px;

            border-radius:8px;

            font-weight:600;

        }

    </style>
</head>

<body>

<div class="dashboard">

    <h2 class="title">
        Welcome Admin <span th:text="${admin}"></span>
    </h2>

    <div class="row g-4">

        <div class="col-md-4">
            <a href="/admin/fields">
                <div class="menu-card">
                    <div class="menu-icon text-primary">
                        <i class="fa-solid fa-futbol"></i>
                    </div>
                    <div class="menu-text">
                        Fields Manager
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/admin/field_books">
                <div class="menu-card">
                    <div class="menu-icon text-success">
                        <i class="fa-solid fa-book"></i>
                    </div>
                    <div class="menu-text">
                        Booking Manager
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/admin/shifts">
                <div class="menu-card">
                    <div class="menu-icon text-warning">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <div class="menu-text">
                        Shift Manager
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-6">
            <a href="/admin/study_schedules">
                <div class="menu-card">
                    <div class="menu-icon text-info">
                        <i class="fa-solid fa-calendar"></i>
                    </div>
                    <div class="menu-text">
                        Study Schedule
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-6">
            <a href="/admin/payments">
                <div class="menu-card">
                    <div class="menu-icon text-danger">
                        <i class="fa-solid fa-credit-card"></i>
                    </div>
                    <div class="menu-text">
                        Payment Manager
                    </div>
                </div>
            </a>
        </div>

    </div>

    <div class="text-center home-btn">
        <a href="/home">
            <button class="btn btn-light">
                <i class="fa fa-home"></i> Back Home
            </button>
        </a>
    </div>

</div>

</body>
</html>
