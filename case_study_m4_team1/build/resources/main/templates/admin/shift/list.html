<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shift Manager</title>
    <th:block th:insert="layout/layout::library"/>
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-image: url('/images/badminton-court-992951.webp');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { position: relative; z-index: 1; padding-top: 60px; }
        .card {
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08); /* giảm mờ, nhìn thấy background */
            backdrop-filter: blur(10px); /* blur nhẹ */
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
        }
        .card-body h2 { font-weight: 700; color: #fff; margin-bottom: 30px; }

        table { width: 100%; color: #fff; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; }
        th { border-bottom: 2px solid rgba(255,255,255,0.3); }
        tr { border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn { font-weight: 600; transition: transform 0.3s, box-shadow 0.3s; margin-top: 20px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .btn-outline-secondary { color: #fff; border-color: #fff; }
        .btn-outline-secondary:hover { background-color: rgba(255,255,255,0.2); color: #fff; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 900px;">
        <div class="card-body text-center">
            <h2 class="fw-bold mb-4">Shift Manager</h2>
            <table>
                <thead>
                <tr>
                    <th>Shift start time</th>
                    <th>Shift end time</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s:${shiftList}">
                    <td th:text="${s.getStartTime()}"></td>
                    <td th:text="${s.getEndTime()}"></td>
                </tr>
                </tbody>
            </table>
            <a href="/admin" class="btn btn-outline-secondary w-50">Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
