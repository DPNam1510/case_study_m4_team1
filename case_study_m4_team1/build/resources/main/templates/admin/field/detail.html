<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"><head>
    <meta charset="UTF-8">
    <title>Field Detail</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<div class="container py-4">
    <div class="card shadow border-0">
        <div class="card-body">
            <h3 class="fw-bold mb-4">Field Detail</h3>

            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Name:</div>
                <div class="col-md-9" th:text="${field.name}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Price:</div>
                <div class="col-md-9 text-success fw-semibold"
                     th:text="${field.price}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Status:</div>
                <div class="col-md-9">
                    <span class="badge bg-success"
                          th:text="${field.status}"></span>
                </div>
            </div>

            <a class="btn btn-secondary" href="/admin/fields">Back</a>
        </div>
    </div>
</div>
</body>
</html>
