<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <title>Field Detail</title>

    <th:block th:insert="layout/layout::library"/>

    <style>

        body{

            background:#f4f6fb;

        }

        .detail-card{

            max-width:500px;

            margin:auto;

            margin-top:80px;

            background:white;

            border-radius:14px;

            padding:35px;

            box-shadow:0 6px 20px rgba(0,0,0,0.1);

        }

        .detail-row{

            margin-bottom:18px;

            font-size:17px;

        }

    </style>

</head>

<body>

<div class="detail-card">

    <h3 class="text-center mb-4">
        ⚽ Field Detail
    </h3>

    <div class="detail-row">

        <strong>Name:</strong>

        <span th:text="${field.name}"></span>

    </div>

    <div class="detail-row">

        <strong>Price:</strong>

        <span class="text-primary fw-semibold"
              th:text="${field.price}">
</span>

    </div>

    <div class="detail-row">

        <strong>Status:</strong>

        <span class="badge bg-success"
              th:if="${field.status.name()=='AVAILABLE'}">
AVAILABLE
</span>

        <span class="badge bg-danger"
              th:if="${field.status.name()=='NOT_AVAILABLE'}">
MAINTENANCE
</span>

    </div>

    <div class="text-center mt-4">

        <a class="btn btn-outline-secondary"
           href="/admin/fields">

            Back

        </a>

    </div>

</div>

</body>

</html>
