<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fields Manager</title>

    <th:block th:insert="layout/layout::library"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{
            background:#f4f6fb;
            min-height:100vh;
        }

        /* title */

        .page-title{

            text-align:center;

            font-weight:700;

            color:#333;

            margin-bottom:30px;

        }

        /* GRID 6 sân */

        .fields-grid{

            display:grid;

            grid-template-columns:repeat(3,1fr);

            gap:25px;

            margin-top:25px;

        }

        /* CARD */

        .field-card{

            background:white;

            border-radius:14px;

            padding:25px;

            text-align:center;

            box-shadow:0 6px 15px rgba(0,0,0,0.08);

            transition:0.25s;

        }

        .field-card:hover{

            transform:translateY(-5px);

            box-shadow:0 12px 25px rgba(0,0,0,0.15);

        }

        .field-icon{

            font-size:38px;

            color:#0d6efd;

            margin-bottom:10px;

        }

        .field-name{

            font-size:20px;

            font-weight:600;

            color:#333;

            margin-bottom:10px;

        }

        .status span{

            padding:6px 14px;

            border-radius:20px;

            font-size:13px;

            font-weight:600;

        }

        .available{

            background:#e6f4ea;

            color:#1e7e34;

        }

        .notavailable{

            background:#fdecea;

            color:#c82333;

        }

        .field-buttons{

            display:flex;

            justify-content:center;

            gap:10px;

            margin-top:10px;

        }

    </style>

</head>

<body>

<div class="container py-4">

    <h2 class="page-title">
        <i class="fa fa-futbol text-primary"></i>
        Fields Manager
    </h2>

    <div class="text-center mb-4">

        <a class="btn btn-outline-primary"
           href="/admin">

            <i class="fa fa-home"></i> Dashboard

        </a>

    </div>

    <!-- SEARCH -->

    <form class="row g-2 mb-4 justify-content-center"
          action="/admin/fields">

        <div class="col-md-4">

            <input class="form-control"
                   name="searchName"
                   th:value="${searchName}"
                   placeholder="Field name...">

        </div>

        <div class="col-md-3">

            <input class="form-control"
                   name="searchPrice"
                   th:value="${searchPrice}"
                   placeholder="Price...">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">
                <i class="fa fa-search"></i> Search
            </button>

        </div>

        <div class="col-md-2">

            <a class="btn btn-secondary w-100"
               href="/admin/fields">
                Reset
            </a>

        </div>

    </form>

    <!-- HIỂN THỊ 6 SÂN -->

    <div class="fields-grid">

        <div class="field-card"
             th:each="f : ${fieldsPage}">

            <div class="field-icon">
                <i class="fa-solid fa-futbol"></i>
            </div>

            <div class="field-name"
                 th:text="${f.name}">
                Field
            </div>

            <div class="status mb-2">

<span th:if="${f.status.name()=='AVAILABLE'}"
      class="available">
AVAILABLE
</span>

                <span th:if="${f.status.name()=='NOT_AVAILABLE'}"
                      class="notavailable">
MAINTENANCE
</span>

            </div>

            <div class="field-buttons">

                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/admin/fields/{id}/detail(id=${f.id})}">
                    Detail
                </a>

                <button class="btn btn-sm btn-warning"
                        data-bs-toggle="modal"
                        data-bs-target="#updateModal"
                        th:attr="data-id=${f.id},data-status=${f.status}">
                    Update
                </button>

            </div>

        </div>

    </div>

    <!-- PAGINATION -->

    <div class="d-flex justify-content-center mt-4 gap-3">

        <a class="btn btn-sm btn-primary"
           th:if="${fieldsPage.hasPrevious()}"
           th:href="@{/admin/fields(page=${fieldsPage.number-1},searchName=${searchName})}">
            Previous
        </a>

        <span class="fw-bold">

Page <span th:text="${fieldsPage.number+1}"></span> /

<span th:text="${fieldsPage.totalPages}"></span>

</span>

        <a class="btn btn-sm btn-primary"
           th:if="${fieldsPage.hasNext()}"
           th:href="@{/admin/fields(page=${fieldsPage.number+1},searchName=${searchName})}">
            Next
        </a>

    </div>

</div>

</body>
</html>
