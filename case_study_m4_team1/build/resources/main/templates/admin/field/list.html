<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fields Information</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<div class="container py-4">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h3 class="mb-4 fw-bold">Fields Manager</h3>
            <a class="btn btn-success btn-sm" href="/admin">Dashboard Amin</a>
            <form class="row g-2 mb-3" action="/admin/fields">
                <div class="col-md-4">
                    <input class="form-control" name="searchName"
                           th:value="${searchName}" placeholder="Field name..."/>
                </div>
                <div class="col-md-3">
                    <input class="form-control" name="searchPrice"
                           th:value="${searchPrice}" placeholder="Price..."/>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100">Search</button>
                </div>
                <div class="col-md-2">
                    <a class="btn btn-secondary w-100" href="/admin/fields">Reset</a>
                </div>
            </form>

            <table class="table table-hover table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f:${fieldsPage}">
                    <td th:text="${f.name}" class="fw-semibold"></td>
                    <td>
                        <a class="btn btn-sm btn-outline-info"
                           th:href="@{/admin/fields/{id}/detail(id=${f.id})}">
                            View Detail
                        </a>
                        <button type="button"
                                class="btn btn-sm btn-success"
                                data-bs-toggle="modal"
                                data-bs-target="#updateModal"
                                th:attr="data-id=${f.id},data-status=${f.status}">
                            Update
                        </button>

                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${fieldsPage.isEmpty()}" class="alert alert-warning">
                No data available
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <a class="btn btn-sm btn-primary"
                   th:if="${fieldsPage.hasPrevious()}"
                   th:href="@{/admin/fields(page=${fieldsPage.number -1},searchName=${searchName})}">
                    Previous
                </a>

                <span class="fw-bold">
                    Page <span th:text="${fieldsPage.number +1}"></span> /
                    <span th:text="${fieldsPage.totalPages}"></span>
                </span>

                <a class="btn btn-sm btn-dark"
                   th:if="${fieldsPage.hasNext()}"
                   th:href="@{/admin/fields(page=${fieldsPage.number +1},searchName=${searchName})}">
                    Next
                </a>
            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="updateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/fields/update}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Update Field Status</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="id" id="fieldId"/>

                    <select class="form-select" name="status" id="fieldStatus" required>
                        <option value="">---Select status---</option>
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="NOT_AVAILABLE">NOT_AVAILABLE</option>
                    </select>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-success">
                        Confirm
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
<div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Success</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p th:text="${mess}"></p>
            </div>
            <div class="modal-footer">
                <button type="button"
                        class="btn btn-success"
                        data-bs-dismiss="modal">
                    OK
                </button>
            </div>

        </div>
    </div>
</div>
</body>
<script th:if="${mess}">
    window.addEventListener('DOMContentLoaded', function () {
        var successModal = new bootstrap.Modal(
            document.getElementById('successModal')
        );
        successModal.show();
    });
</script>
<script>
    const updateModal = document.getElementById('updateModal');

    updateModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        const id = button.getAttribute('data-id');
        const status = button.getAttribute('data-status');

        document.getElementById('fieldId').value = id;
        document.getElementById('fieldStatus').value = status;
    });
</script>
</html>
