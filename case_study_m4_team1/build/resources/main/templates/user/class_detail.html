<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Detail</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3 th:text="${schedule.className}">Class</h3>
        </div>
        <div class="card-body">
            <table class="table">
                <tr>
                    <th style="width: 200px;">Coach:</th>
                    <td th:text="${schedule.teacher.name}"></td>
                </tr>
                <tr>
                    <th>Field:</th>
                    <td th:text="${schedule.field.name}"></td>
                </tr>
                <tr>
                    <th>Shift:</th>
                    <td th:text="${schedule.shift.startTime} + ' - ' + ${schedule.shift.endTime}"></td>
                </tr>
                <tr>
                    <th>Schedule:</th>
                    <td th:text="${schedule.className}"></td>
                </tr>
                <tr>
                    <th>Fee:</th>
                    <td th:text="${#numbers.formatDecimal(schedule.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                </tr>
                <tr>
                    <th>Registered quantity:</th>
                    <td>
                        <span th:text="${registeredCount}"></span>/<span th:text="${schedule.maxStudents}"></span>
                        <span th:if="${registeredCount >= schedule.minStudents}" class="badge bg-success">OPEN</span>
                        <span th:if="${registeredCount < schedule.minStudents}" class="badge bg-warning">NOT OPEN <span th:text="${schedule.minStudents - registeredCount}"></span> students</span>
                    </td>
                </tr>
                <tr>
                    <th>There's room:</th>
                    <td>
                        <span th:text="${availableSlots}"></span> place
                    </td>
                </tr>
            </table>

            <div class="mt-3">
                <form th:action="@{/user/study/register}" method="post"
                      th:if="${availableSlots > 0 and schedule.statusClass != 'FULL'}">
                    <input type="hidden" name="scheduleId" th:value="${schedule.id}">
                    <button type="submit" class="btn btn-success btn-lg">Register class</button>
                </form>

                <div th:if="${availableSlots <= 0 or schedule.statusClass == 'FULL'}"
                     class="alert alert-warning">
                    Class was full, cannot register.
                </div>

                <a href="/user/study/classes" class="btn btn-secondary mt-2">Back list</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
