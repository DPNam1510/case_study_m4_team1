<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lịch học của tôi</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <span th:text="${param.success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div class="container mt-4">
    <h2>Lịch học của tôi</h2>

    <div th:if="${#lists.isEmpty(myClasses)}" class="alert alert-info">
        Bạn chưa đăng ký lớp học nào.
        <a href="/user/study/classes" class="alert-link">Đăng ký ngay</a>
    </div>

    <div th:unless="${#lists.isEmpty(myClasses)}">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>STT</th>
                <th>Lớp học</th>
                <th>Giảng viên</th>
                <th>Lịch học</th>
                <th>Ca học</th>
                <th>Trạng thái</th>
                <th>Thanh toán</th>
                <th>Đánh giá</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, iterStat : ${myClasses}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${item.studySchedule.className}"></td>
                <td th:text="${item.studySchedule.teacher.name}"></td>
                <td th:text="${item.studySchedule.className}"></td>
                <td th:text="${item.studySchedule.shift.startTime} + ' - ' + ${item.studySchedule.shift.endTime}"></td>
                <td>
                    <span th:if="${item.statusRegister == 'APPROVED'}" class="badge bg-success">Đã duyệt</span>
                    <span th:if="${item.statusRegister == 'PENDING'}" class="badge bg-warning">Chờ duyệt</span>
                    <span th:if="${item.statusRegister == 'CANCELED'}" class="badge bg-danger">Đã hủy</span>
                </td>
                <td>
                            <span th:if="${item.paymentRegister != null and item.paymentRegister.status == 'PAID'}"
                                  class="badge bg-success">Đã thanh toán</span>
                    <span th:if="${item.paymentRegister == null or item.paymentRegister.status == 'UNPAID'}"
                          class="badge bg-warning">Chưa thanh toán</span>
                    <a th:if="${item.paymentRegister == null or item.paymentRegister.status == 'UNPAID'}"
                       th:href="@{/user/study/payment/{id}(id=${item.id})}"
                       class="btn btn-sm btn-primary mt-1">Thanh toán</a>
                </td>
                <td>
                            <span th:if="${item.teacherReview != null}">
                                <span th:text="${item.teacherReview.scores}"></span> -
                                <span th:text="${item.teacherReview.review}"></span>
                            </span>
                    <span th:unless="${item.teacherReview != null}" class="text-muted">Chưa có</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
