<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Danh sách lớp học</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <span th:text="${param.success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <span th:text="${param.error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div class="container mt-4">
    <h2>Danh sách lớp học cầu lông</h2>

    <div class="row mt-4">
        <div th:each="class : ${classes}" class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-header" th:text="${class.className}">Lớp học</div>
                <div class="card-body">
                    <p><strong>Giảng viên:</strong> <span th:text="${class.teacher.name}"></span></p>
                    <p><strong>Sân:</strong> <span th:text="${class.field.name}"></span></p>
                    <p><strong>Ca học:</strong>
                        <span th:text="${class.shift.startTime} + ' - ' + ${class.shift.endTime}"></span>
                    </p>
                    <p><strong>Học phí:</strong> <span th:text="${#numbers.formatDecimal(class.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></p>
                    <p><strong>Sĩ số:</strong> <span th:text="${class.minStudents} + '/' + ${class.maxStudents}"></span></p>
                    <p><strong>Trạng thái:</strong>
                        <span th:if="${class.statusClass == 'OPEN'}" class="badge bg-success">Đang mở</span>
                        <span th:if="${class.statusClass == 'NOT_OPEN'}" class="badge bg-warning">Chưa mở</span>
                        <span th:if="${class.statusClass == 'FULL'}" class="badge bg-secondary">Đã đầy</span>
                    </p>

                    <a th:href="@{/user/study/class/{id}/detail(id=${class.id})}"
                       class="btn btn-primary">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
