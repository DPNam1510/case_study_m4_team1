<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Assessment | Badminton Center</title>
    <th:block th:insert="~{layout/layout::library}"/>
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 40px 0;
            margin-bottom: 40px;
            text-align: center;
        }
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto 60px;
        }
        .student-info {
            background: #e9ecef;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .student-info h4 {
            color: #1e3c72;
            font-weight: 600;
        }
        .form-label {
            font-weight: 600;
            color: #2a5298;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ced4da;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.2rem rgba(42,82,152,0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42,82,152,0.4);
        }
        .btn-cancel {
            background: #6c757d;
            color: white;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-cancel:hover {
            background: #5a6268;
            color: white;
        }
        footer {
            background: #212529;
            color: white;
            padding: 40px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/teacher">
            <i class="fa-solid fa-chalkboard-user"></i>
            Teacher Panel
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/teacher">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/teacher/classes">My Classes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-star me-3"></i>Student Assessment</h1>
        <p class="lead">Evaluate student performance</p>
    </div>
</div>

<div class="form-container">
    <div class="student-info">
        <h4><i class="fas fa-user-graduate me-2"></i><span th:text="${classRegister.user.name}"></span></h4>
        <p class="mb-0">Class: <span th:text="${classRegister.studySchedule.className}"></span></p>
    </div>

    <form th:action="@{/teacher/class/student/review}" method="post">
        <input type="hidden" name="classRegisterId" th:value="${classRegister.id}">

        <div class="mb-4">
            <label for="scores" class="form-label"><i class="fas fa-tachometer-alt me-2"></i>Score (0-10)</label>
            <input type="number" class="form-control" id="scores" name="scores"
                   min="0" max="10" step="0.5" required>
        </div>

        <div class="mb-4">
            <label for="review" class="form-label"><i class="fas fa-comment me-2"></i>Comment</label>
            <textarea class="form-control" id="review" name="review" rows="4" placeholder="Write your feedback..." required></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn-submit"><i class="fas fa-save me-2"></i>Save Assessment</button>
            <a href="/teacher/classes" class="btn-cancel"><i class="fas fa-times me-2"></i>Cancel</a>
        </div>
    </form>
</div>

<footer class="text-center">
    <h5>Badminton Center</h5>
    <p>Online Court Booking System</p>
    <p>© 2026 All rights reserved</p>
</footer>
</body>
</html>
