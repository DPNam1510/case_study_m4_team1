<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class list</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <h2>Teacher Class List</h2>

    <div th:if="${#lists.isEmpty(schedules)}" class="alert alert-info">
        You don't have any classes yet.
    </div>

    <div th:unless="${#lists.isEmpty(schedules)}" class="row">
        <div th:each="schedule : ${schedules}" class="col-md-6 mb-3">
            <div class="card">
                <div class="card-header" th:text="${schedule.className}">Class</div>
                <div class="card-body">
                    <p><strong>Field:</strong> <span th:text="${schedule.field.name}"></span></p>
                    <p><strong>Shift:</strong>
                        <span th:text="${schedule.shift.startTime} + ' - ' + ${schedule.shift.endTime}"></span>
                    </p>
                    <p><strong>Number of students:</strong> <span th:text="${schedule.minStudents} + '/' + ${schedule.maxStudents}"></span></p>
                    <p><strong>Status:</strong>
                        <span th:text="${schedule.statusClass}" class="badge bg-info"></span>
                    </p>

                    <a th:href="@{/teacher/class/{id}/students(id=${schedule.id})}"
                       class="btn btn-primary">Students view</a>
                    <a th:href="@{/teacher/class/{id}/notice(id=${schedule.id})}"
                       class="btn btn-warning">Off notice</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
