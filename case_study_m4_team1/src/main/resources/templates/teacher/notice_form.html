<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Off Notice</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <h2>Off Notice</h2>

    <form th:action="@{/teacher/class/notice}" method="post" class="mt-3">
        <input type="hidden" name="scheduleId" th:value="${scheduleId}">

        <div class="mb-3">
            <label for="reason" class="form-label">Reason</label>
            <textarea class="form-control" id="reason" name="reason" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-warning">Send</button>
        <a href="/teacher/classes" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
