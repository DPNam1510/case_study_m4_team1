<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <h2>Hello, <span th:text="${teacher.name}"></span>!</h2>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header">Class Management</div>
                <div class="card-body">
                    <a href="/teacher/classes" class="btn btn-light">View</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
