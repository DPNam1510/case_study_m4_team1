<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student assessment</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <h2>Student assessment: <span th:text="${classRegister.user.name}"></span></h2>

    <form th:action="@{/teacher/class/student/review}" method="post" class="mt-3">
        <input type="hidden" name="classRegisterId" th:value="${classRegister.id}">

        <div class="mb-3">
            <label for="scores" class="form-label">Scores (0-10)</label>
            <input type="number" class="form-control" id="scores" name="scores"
                   min="0" max="10" step="0.5" required>
        </div>

        <div class="mb-3">
            <label for="review" class="form-label">Comment</label>
            <textarea class="form-control" id="review" name="review" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save assessment</button>
        <a href="/teacher/classes" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
