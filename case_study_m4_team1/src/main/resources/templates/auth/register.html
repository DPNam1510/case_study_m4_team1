<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Register</title>

    <th:block th:insert="~{layout/layout::library}"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{

            background:linear-gradient(135deg,#22c55e,#06b6d4);

            height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:'Segoe UI',sans-serif;

        }

        .register-card{

            background:white;

            padding:40px;

            border-radius:16px;

            width:420px;

            box-shadow:0 15px 35px rgba(0,0,0,0.2);

            animation:fadeIn 0.6s ease;

        }

        @keyframes fadeIn{

            from{opacity:0;transform:translateY(20px)}

            to{opacity:1;transform:translateY(0)}

        }

        .register-title{

            text-align:center;

            font-weight:700;

            margin-bottom:25px;

            color:#1e293b;

        }

        .input-group{

            margin-bottom:14px;

        }

        .input-group label{

            font-weight:600;

        }

        .input-group input{

            width:100%;

            padding:10px 12px;

            border-radius:6px;

            border:1px solid #d1d5db;

            transition:0.25s;

        }

        .input-group input:focus{

            outline:none;

            border-color:#22c55e;

            box-shadow:0 0 5px rgba(34,197,94,0.4);

        }

        .register-btn{

            width:100%;

            padding:11px;

            border:none;

            border-radius:7px;

            background:#16a34a;

            color:white;

            font-weight:600;

            transition:0.25s;

            margin-top:10px;

        }

        .register-btn:hover{

            background:#15803d;

            transform:translateY(-2px);

        }

        .login-link{

            display:block;

            text-align:center;

            margin-top:15px;

            color:#475569;

            text-decoration:none;

        }

        .login-link:hover{

            text-decoration:underline;

        }

        .icon{

            text-align:center;

            font-size:40px;

            margin-bottom:10px;

            color:#16a34a;

        }

        small{

            display:block;

            margin-top:-6px;

            margin-bottom:6px;

        }

    </style>

</head>

<body>

<th:block th:replace="~{layout/toasts :: toasts(success=${success}, error=${error})}"/>

<div class="register-card">

    <div class="icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <h3 class="register-title">Create Account</h3>

    <form th:action="@{/register}" method="post" th:object="${registerAccountDto}">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" required>
            <small class="text-danger" th:errors="*{fullName}"></small>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" required>
            <small class="text-danger" th:errors="*{username}"></small>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" required>
            <small class="text-danger" th:errors="*{password}"></small>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" required>
            <small class="text-danger" th:errors="*{email}"></small>
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="text" th:field="*{phone}" required>
            <small class="text-danger" th:errors="*{phone}"></small>
        </div>

        <button class="register-btn">
            <i class="fa fa-user-plus"></i> Register
        </button>

    </form>

    <a class="login-link" href="/login">
        Already have an account? Login
    </a>

</div>

</body>
</html>
