<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <th:block th:insert="~{layout/layout::library}"/>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: #fff; padding: 40px 50px; border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); width: 400px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 10px 12px;
            margin-bottom: 20px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 10px 0; background: #2196F3; border: none; border-radius: 6px;
            color: white; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1976D2; }
        .login-link { display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- Toast fragment nhận success/error từ flash attribute -->
<th:block th:replace="~{layout/toasts :: toasts(success=${success}, error=${error})}"/>

<div class="register-container">
    <h2>Register</h2>
    <form th:action="@{/register}" method="post" th:object="${registerAccountDto}">
        <div>
            <label>Full name</label>
            <input type="text" th:field="*{fullName}" required/>
            <small class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small><br>
        </div>
        <div>
            <label>Username</label>
            <input type="text" th:field="*{username}" required/>
            <small class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small><br>
        </div>
        <div>
            <label>Password</label>
            <input type="password" th:field="*{password}" required/>
            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small><br>
        </div>
        <div>
            <label>Email</label>
            <input type="email" th:field="*{email}" required/>
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small><br>
        </div>
        <div>
            <label>Phone</label>
            <input type="text" th:field="*{phone}" required/>
            <small class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small><br>
        </div>
        <button type="submit">Register</button>
    </form>
    <a class="login-link" href="/login">Already have an account? Login</a>
</div>

</body>
</html>
