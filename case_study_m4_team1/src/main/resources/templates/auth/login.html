<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Login</title>

    <th:block th:insert="~{layout/layout::library}"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{

            background:linear-gradient(135deg,#38bdf8,#6366f1);

            height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:'Segoe UI',sans-serif;

        }

        /* CARD */

        .login-card{

            background:white;

            padding:45px;

            border-radius:16px;

            width:360px;

            box-shadow:0 15px 35px rgba(0,0,0,0.2);

            animation:fadeIn 0.6s ease;

        }

        @keyframes fadeIn{

            from{opacity:0;transform:translateY(20px)}

            to{opacity:1;transform:translateY(0)}

        }

        .login-title{

            text-align:center;

            font-weight:700;

            margin-bottom:30px;

            color:#1e293b;

        }

        /* INPUT */

        .input-group{

            margin-bottom:18px;

        }

        .input-group label{

            font-weight:600;

            margin-bottom:4px;

            display:block;

        }

        .input-group input{

            width:100%;

            padding:10px 12px;

            border-radius:6px;

            border:1px solid #d1d5db;

            transition:0.25s;

        }

        .input-group input:focus{

            outline:none;

            border-color:#3b82f6;

            box-shadow:0 0 5px rgba(59,130,246,0.4);

        }

        /* BUTTON */

        .login-btn{

            width:100%;

            padding:11px;

            border:none;

            border-radius:7px;

            background:#2563eb;

            color:white;

            font-weight:600;

            transition:0.25s;

        }

        .login-btn:hover{

            background:#1d4ed8;

            transform:translateY(-2px);

        }

        /* LINK */

        .register-link{

            display:block;

            text-align:center;

            margin-top:15px;

            color:#475569;

            text-decoration:none;

        }

        .register-link:hover{

            text-decoration:underline;

        }

        .icon{

            text-align:center;

            font-size:40px;

            margin-bottom:10px;

            color:#2563eb;

        }

    </style>

</head>

<body>

<th:block th:replace="~{layout/toasts :: toasts(success=${success}, error=${error})}"/>

<div class="login-card">

    <div class="icon">
        <i class="fa-solid fa-table-tennis-paddle-ball"></i>
    </div>

    <h3 class="login-title">Badminton Booking</h3>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="login-btn">
            <i class="fa fa-sign-in-alt"></i> Login
        </button>

    </form>

    <a class="register-link"
       th:href="@{/register}">
        Don't have an account? Register </a>

</div>

</body>
</html>
