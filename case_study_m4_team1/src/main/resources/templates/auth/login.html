<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <th:block th:insert="~{layout/layout::library}"/>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 40px 50px; border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px;
            margin-bottom: 20px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 10px 0; background: #4CAF50; border: none;
            border-radius: 6px; color: white; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #45a049; }
        .register-link { display: block; text-align: center; margin-top: 15px; color: #555;
            text-decoration: none; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- Toast fragment nhận success/error từ model -->
<th:block th:replace="~{layout/toasts :: toasts(success=${success}, error=${error})}"/>

<div class="login-container">
    <h2>Login</h2>
    <form th:action="@{/login}" method="post">
        <div>
            <label>Username</label>
            <input type="text" name="username" required/>
        </div>
        <div>
            <label>Password</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit">Login</button>
    </form>
    <a class="register-link" href="/register">Don't have an account? Register</a>
</div>

</body>
</html>
