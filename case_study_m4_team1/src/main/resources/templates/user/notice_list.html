<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thông báo nghỉ học</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div class="container mt-4">
    <h2>Thông báo nghỉ học</h2>

    <div th:if="${#lists.isEmpty(notices)}" class="alert alert-info">
        Không có thông báo nào.
    </div>

    <div th:unless="${#lists.isEmpty(notices)}" class="list-group mt-3">
        <div th:each="notice : ${notices}" class="list-group-item">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1" th:text="${notice.classRegister.studySchedule.className}">Lớp học</h5>
                <small th:text="${#temporals.format(notice.classRegister.studySchedule.shift.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(notice.classRegister.studySchedule.shift.endTime, 'HH:mm')}">Ca học</small>
            </div>
            <p class="mb-1" th:text="${notice.reason}">Lý do nghỉ</p>
            <small>Giảng viên: <span th:text="${notice.classRegister.studySchedule.teacher.name}"></span></small>
        </div>
    </div>

    <a href="/user/study/my-schedule" class="btn btn-secondary mt-3">Quay lại</a>
</div>
</body>
</html>
