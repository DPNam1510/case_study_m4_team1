<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán học phí</title>
    <th:block th:insert="layout/layout::library"/>
</head>
<body>
<th:block th:insert="layout/layout::my-navbar"/>

<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <span th:text="${param.error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>Thanh toán học phí</h3>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <h5>Thông tin đăng ký:</h5>
                <p><strong>Lớp:</strong> <span th:text="${register.studySchedule.className}"></span></p>
                <p><strong>Giảng viên:</strong> <span th:text="${register.studySchedule.teacher.name}"></span></p>
                <p><strong>Học phí:</strong> <span th:text="${#numbers.formatDecimal(register.studySchedule.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></p>
            </div>

            <form th:action="@{/user/study/payment/process}" method="post">
                <input type="hidden" name="registerId" th:value="${register.id}">

                <div class="mb-3">
                    <label class="form-label">Chọn hình thức thanh toán</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payTypeId" id="cash" value="1" checked>
                        <label class="form-check-label" for="cash">
                            Tiền mặt
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payTypeId" id="banking" value="2">
                        <label class="form-check-label" for="banking">
                            Chuyển khoản (thanh toán giả lập)
                        </label>
                    </div>
                </div>

                <div class="mb-3" id="bankingInfo" style="display: none;">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6>Thông tin chuyển khoản:</h6>
                            <p>Ngân hàng: Vietcombank</p>
                            <p>Số tài khoản: 1234567890</p>
                            <p>Chủ tài khoản: CTCP Cầu lông</p>
                            <p>Nội dung: <span th:text="'HOCPHI_' + ${register.user.name}"></span></p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success">Xác nhận thanh toán</button>
                <a href="/user/study/my-schedule" class="btn btn-secondary">Hủy</a>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('input[name="payTypeId"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('bankingInfo').style.display =
                this.value === '2' ? 'block' : 'none';
        });
    });
</script>
</body>
</html>
