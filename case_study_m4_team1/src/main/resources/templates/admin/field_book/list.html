    <meta charset="UTF-8">

<body>
<h1>Field Book Manager</h1>
<a class="btn btn-sm btn-success" href="/admin" >Dashboard admin</a>
<a class="btn btn-sm btn-primary" href="/admin/field_books/pending" >PENDING list</a>
<form action="/admin/field_books">
    <input name="searchUser" th:value="${searchUser}" placeholder="Enter user name..."/>
    <input name="searchField" th:value="${searchField}" placeholder="Enter field name..."/>
    <input name="searchDate" th:value="${searchDate}" placeholder="Enter date..."/>
    <button>Search</button>
    <a class="btn btn-sm btn-light" href="/admin/field_books">Back</a>
</form>
<table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
    <tr>
        <th>User</th>
        <th>Field</th>
        <th>Start</th>
        <th>End</th>
        <th>Date</th>
        <th>Status</th>
<!--        <th class="text-center">Action</th>-->
    </tr>
    </thead>
    <tbody>
    <tr th:each="fb:${fieldBookPage}">
        <td th:text="${fb.user.name}"></td>
        <td th:text="${fb.field.name}"></td>
        <td th:text="${fb.shift.getStartTime()}"></td>
        <td th:text="${fb.shift.getEndTime()}"></td>
        <td th:text="${fb.dateBook}"></td>
        <td>
            <span class="badge bg-warning text-dark"
                  th:text="${fb.status}"></span>
        </td>
