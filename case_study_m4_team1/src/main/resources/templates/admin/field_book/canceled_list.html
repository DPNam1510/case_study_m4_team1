<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>CANCELED LIST</title>

    <th:block th:insert="layout/layout::library"/>

    <style>

        body{
            background:linear-gradient(135deg,#e3f2fd,#f1f8e9);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }

        .container{
            padding:40px 20px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-weight:700;
            color:#2c3e50;
        }

        .action-buttons{
            text-align:center;
            margin-bottom:20px;
        }

        .action-buttons a{
            margin:5px;
            border-radius:20px;
            padding:6px 14px;
        }

        .form-inline-search{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
            margin-bottom:25px;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        .form-inline-search input{
            flex:1 1 180px;
        }

        .booking-card{
            background:white;
            border-radius:12px;
            padding:18px;
            display:grid;
            grid-template-columns:1.3fr 1.3fr 1fr 1fr 0.8fr;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            transition:all .2s;
        }

        .booking-card:hover{
            transform:translateY(-4px);
            box-shadow:0 8px 18px rgba(0,0,0,0.2);
        }

        .booking-card i{
            color:#e53935;
            margin-right:6px;
        }

        .pagination-wrapper{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-top:25px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Canceled Booking</h1>

    <!-- NAVIGATION BUTTONS -->

    <div class="action-buttons">

        <a class="btn btn-success btn-sm" href="/admin">
            Dashboard
        </a>

        <a class="btn btn-primary btn-sm" href="/admin/field_books">
            Approved
        </a>

        <a class="btn btn-warning btn-sm" href="/admin/field_books/pending">
            Pending
        </a>

    </div>

    <!-- SEARCH -->

    <form class="form-inline-search" action="/admin/field_books/canceled">

        <input
                class="form-control"
                name="searchUser"
                th:value="${searchUser}"
                placeholder="User name">

        <input
                class="form-control"
                name="searchField"
                th:value="${searchField}"
                placeholder="Field name">

        <input
                class="form-control"
                type="date"
                name="searchDate"
                th:value="${searchDate}">

        <button class="btn btn-primary">
            Search
        </button>

        <a class="btn btn-light" href="/admin/field_books/canceled">
            Reset
        </a>

    </form>

    <!-- EMPTY DATA -->

    <div th:if="${fieldBookPage.isEmpty()}" class="alert alert-warning text-center">
        No data
    </div>

    <!-- LIST -->

    <div th:each="fb : ${fieldBookPage}" class="booking-card">

        <div>
            <i class="bi bi-person-circle"></i>
            <span th:text="${fb.user.name}"></span>
        </div>

        <div>
            <i class="bi bi-geo-alt-fill"></i>
            <span th:text="${fb.field.name}"></span>
        </div>

        <div>
            <i class="bi bi-clock-fill"></i>
            <span th:text="${fb.shift.startTime} + ' - ' + ${fb.shift.endTime}"></span>
        </div>

        <div>
            <i class="bi bi-calendar-date"></i>
            <span th:text="${fb.dateBook}"></span>
        </div>

        <div>
            <span class="badge bg-danger" th:text="${fb.status}"></span>
        </div>

    </div>

    <!-- PAGINATION -->

    <div class="pagination-wrapper">

        <a
                class="btn btn-primary btn-sm"
                th:if="${fieldBookPage.hasPrevious()}"
                th:href="@{/admin/field_books/canceled(page=${fieldBookPage.number-1})}">
            Previous
        </a>

        <span class="btn btn-light btn-sm disabled">
Page
<span th:text="${fieldBookPage.number+1}"></span>
/
<span th:text="${fieldBookPage.totalPages}"></span>
</span>

        <a
                class="btn btn-dark btn-sm"
                th:if="${fieldBookPage.hasNext()}"
                th:href="@{/admin/field_books/canceled(page=${fieldBookPage.number+1})}">
            Next
        </a>

    </div>

</div>

</body>
</html>
