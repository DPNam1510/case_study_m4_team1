<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Booking</title>
    <th:block th:insert="~{layout/layout::library}"/>

    <style>

        body{
            background-image:url("https://images.unsplash.com/photo-1599058917765-a780eda07a3e");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        .overlay{
            background:rgba(0,0,0,0.55);
            min-height:100vh;
            padding-top:80px;
        }

        .card{
            border-radius:18px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .btn{
            border-radius:10px;
            transition:0.25s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 18px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-header bg-warning text-dark text-center">
                        🏸 Update Booking
                    </div>

                    <div class="card-body">

                        <form th:action="@{/booking/update/{id}(id=${bookingId})}" method="post">

                            <input type="hidden" name="userId" th:value="${userId}">

                            <div class="mb-3">

                                <label>Field</label>

                                <select name="fieldId" class="form-control">

                                    <option th:each="f:${fields}" th:value="${f.id}"
                                            th:text="${f.name}" th:selected="${f.id==booking.fieldId}">
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label>Shift</label>

                                <select name="shiftId" class="form-control">

                                    <option th:each="s:${shifts}"
                                            th:value="${s.id}"
                                            th:text="${s.startTime+' - '+s.endTime}">
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label>Date</label>

                                <input type="date" name="dateBook" class="form-control"
                                       th:value="${booking.dateBook}">

                            </div>

                            <div class="d-flex justify-content-between">

                                <button class="btn btn-warning">Update</button>

                                <a th:href="@{/booking/history(userId=${userId})}"
                                   class="btn btn-secondary">
                                    Back
                                </a>

                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
