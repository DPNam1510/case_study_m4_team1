<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Detail</title>
    <th:block th:insert="~{layout/layout::library}"/>

    <style>

        body{
            background-image:url("https://images.unsplash.com/photo-1612872087720-bb876e2e67d1?auto=format&fit=crop&w=1920&q=80");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        .overlay{
            background:rgba(0,0,0,0.55);
            min-height:100vh;
            padding-top:80px;
        }

        .card{
            border-radius:18px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .btn{
            border-radius:10px;
            transition:0.25s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 18px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-header bg-primary text-white text-center">
                        🏸 Booking Detail
                    </div>

                    <div class="card-body">

                        <p><strong>Field:</strong>
                            <span th:text="${booking.fieldName}"></span>
                        </p>

                        <p><strong>Date:</strong>
                            <span th:text="${booking.dateBook}"></span>
                        </p>

                        <p><strong>Shift:</strong>
                            <span th:text="${booking.shiftTime}"></span>
                        </p>

                        <p><strong>Status:</strong>
                            <span class="badge bg-success"
                                  th:text="${booking.status}">
</span>
                        </p>

                        <div class="text-center mt-4">

                            <a th:href="@{/booking/history(userId=${booking.userId})}"
                               class="btn btn-secondary">
                                ⬅ Back
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
